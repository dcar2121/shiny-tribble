<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USS CYBERDEFENDER - Dwayne Hans Jr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0e1a;
            color: #e0e6f0;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }

        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(2px 2px at 20% 30%, white, transparent),
                radial-gradient(2px 2px at 60% 70%, white, transparent),
                radial-gradient(1px 1px at 50% 50%, white, transparent),
                radial-gradient(1px 1px at 80% 10%, white, transparent),
                radial-gradient(2px 2px at 90% 60%, white, transparent),
                radial-gradient(1px 1px at 33% 80%, white, transparent),
                radial-gradient(1px 1px at 75% 25%, white, transparent);
            background-size: 200% 200%;
            animation: starMove 100s linear infinite;
            opacity: 0.4;
            z-index: 0;
        }

        @keyframes starMove {
            from { background-position: 0 0; }
            to { background-position: 200% 200%; }
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 2rem;
            min-height: 100vh;
        }

        .hud-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 2;
        }

        .hud-corner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(0, 255, 136, 0.3);
        }

        .hud-corner.top-left {
            top: 1rem;
            left: 1rem;
            border-right: none;
            border-bottom: none;
        }

        .hud-corner.top-right {
            top: 1rem;
            right: 1rem;
            border-left: none;
            border-bottom: none;
        }

        .hud-corner.bottom-left {
            bottom: 1rem;
            left: 1rem;
            border-right: none;
            border-top: none;
        }

        .hud-corner.bottom-right {
            bottom: 1rem;
            right: 1rem;
            border-left: none;
            border-top: none;
        }

        .command-center {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header-section {
            background: rgba(10, 14, 26, 0.9);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1);
            backdrop-filter: blur(10px);
        }

        .title-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 0.5rem;
            margin: 0;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            animation: titleGlow 3s ease-in-out infinite;
        }

        .title-prefix {
            color: #00ff88;
            display: block;
            font-size: 1.5rem;
            letter-spacing: 1rem;
        }

        .title-main {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
            50% { text-shadow: 0 0 40px rgba(0, 255, 136, 0.8); }
        }

        .subtitle {
            color: #7a8fa0;
            font-size: 0.9rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        .commander-id {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0, 255, 136, 0.2);
        }

        .commander-label {
            font-size: 0.7rem;
            color: #7a8fa0;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .commander-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00ff88;
            letter-spacing: 0.3rem;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            margin-bottom: 0.3rem;
        }

        .commander-title {
            font-size: 0.95rem;
            color: #00d4ff;
            letter-spacing: 0.15rem;
            font-weight: 500;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .status-item {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 4px;
            padding: 1rem;
            text-align: center;
        }

        .status-label {
            font-size: 0.7rem;
            color: #7a8fa0;
            letter-spacing: 0.1rem;
            margin-bottom: 0.5rem;
        }

        .status-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 10px currentColor;
        }

        .status-value.warning {
            color: #ff3366;
        }

        .dmz-progress-container {
            background: rgba(10, 14, 26, 0.9);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        .progress-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #00d4ff;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.2rem;
            margin-bottom: 1rem;
        }

        .progress-track {
            position: relative;
            height: 30px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            border-radius: 15px;
            transition: width 0.5s ease;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
            width: 0%;
        }

        .progress-pulse {
            position: absolute;
            top: 0;
            right: 0;
            width: 20px;
            height: 100%;
            background: white;
            opacity: 0.3;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        .progress-markers {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
        }

        .marker {
            position: absolute;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.3s;
            font-size: 14px;
        }

        .marker.active {
            color: #fff;
        }

        .dmz-achieved {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #00ff88;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.1rem;
            animation: celebrate 1s ease-in-out;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .mission-stations {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .station-card {
            background: rgba(10, 14, 26, 0.9);
            border: 2px solid;
            border-radius: 8px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .station-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, currentColor, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .station-card:hover::before {
            opacity: 0.1;
        }

        .station-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 30px rgba(0, 255, 136, 0.3);
        }

        .station-card.complete {
            border-color: #00ff88 !important;
        }

        .station-icon {
            position: relative;
            flex-shrink: 0;
            width: 32px;
            height: 32px;
        }

        .complete-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #00ff88;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: badgePop 0.3s ease;
        }

        @keyframes badgePop {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .station-info {
            flex-grow: 1;
        }

        .station-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .station-category {
            color: #9aa5b5;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .station-progress {
            font-size: 0.75rem;
            color: #7a8fa0;
            letter-spacing: 0.1rem;
        }

        .station-chevron {
            font-size: 2rem;
            opacity: 0.5;
        }

        .station-view {
            display: none;
        }

        .station-view.active {
            display: block;
        }

        .station-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .back-button {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
            padding: 0.7rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            letter-spacing: 0.1rem;
            transition: all 0.3s;
        }

        .back-button:hover {
            background: rgba(0, 255, 136, 0.2);
            transform: translateX(-5px);
        }

        .station-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .station-title h2 {
            font-size: 2rem;
            margin: 0;
            letter-spacing: 0.2rem;
        }

        .station-subtitle {
            color: #7a8fa0;
            font-size: 0.9rem;
            letter-spacing: 0.1rem;
        }

        .scenarios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .scenario-card {
            background: rgba(10, 14, 26, 0.95);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .scenario-card:hover {
            border-color: rgba(0, 255, 136, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.2);
        }

        .scenario-card.completed {
            border-color: rgba(0, 255, 136, 0.5);
            background: rgba(0, 255, 136, 0.05);
        }

        .scenario-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .scenario-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #e0e6f0;
        }

        .icon {
            width: 20px;
            height: 20px;
        }

        .complete-icon {
            color: #00ff88;
        }

        .threat-icon {
            color: #ff3366;
            animation: threatBlink 2s ease-in-out infinite;
        }

        @keyframes threatBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .threat-banner {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 51, 102, 0.1);
            border-left: 3px solid #ff3366;
            color: #ff3366;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: 0.05rem;
        }

        .scenario-description {
            color: #9aa5b5;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .protocols-list {
            margin-bottom: 1rem;
        }

        .protocols-label {
            font-size: 0.7rem;
            color: #7a8fa0;
            letter-spacing: 0.1rem;
            margin-bottom: 0.5rem;
        }

        .protocol-tag {
            display: inline-block;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #00d4ff;
            padding: 0.3rem 0.7rem;
            border-radius: 3px;
            font-size: 0.75rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05rem;
        }

        .mitigation-result {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1rem;
            background: rgba(0, 255, 136, 0.05);
            border-left: 3px solid #00ff88;
            color: #00ff88;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: 0.05rem;
        }

        .engage-button {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 4px;
            color: #0a0e1a;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .engage-button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        .scanning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .scanning-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .scan-content {
            text-align: center;
        }

        .scan-icon {
            width: 48px;
            height: 48px;
            color: #00d4ff;
            animation: scanRotate 2s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes scanRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .scan-text {
            font-size: 1.2rem;
            color: #00d4ff;
            letter-spacing: 0.2rem;
            margin-bottom: 1.5rem;
        }

        .scan-bar {
            width: 300px;
            height: 4px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin: 0 auto;
        }

        .scan-progress {
            height: 100%;
            background: #00d4ff;
            animation: scanProgress 2s ease-in-out;
            box-shadow: 0 0 10px #00d4ff;
        }

        @keyframes scanProgress {
            from { width: 0%; }
            to { width: 100%; }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .main-title {
                font-size: 2rem;
            }

            .title-prefix {
                font-size: 1rem;
            }

            .scenarios-grid {
                grid-template-columns: 1fr;
            }

            .mission-stations {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                    {

                        description: 'Produced comprehensive technical documentation including network diagrams, procedures, metrics dashboards, and operational playbooks. Created visual representations for executive presentations.',
                        protocols: ['Standard Operating Procedures', 'Metrics Reporting', 'Architecture Diagrams', 'Compliance Docs'],

            },
            network: {
                id: 'network',

                scenarios: [
                    {
                        id: 'architecture',
                        title: 'Network Architecture',
                        threat: 'Bandwidth saturation',
                        description: 'Designed multi-tier network with spine-leaf topology, SDN controllers, and traffic engineering. Implemented BGP routing with automated failover.',
                        protocols: ['BGP', 'OSPF', 'MPLS', 'SDN', 'QoS'],
                        mitigation: '400Gbps sustained throughput'
                    },
                    {
                        id: 'dmz',
                        title: 'DMZ Segmentation',
                        threat: 'Lateral movement risk',
                        description: 'Architected secure DMZ with multi-zone isolation, proxy services, and micro-segmentation. Implemented zero-trust network access controls.',
                        protocols: ['Network Segmentation', 'Proxy Servers', 'NAT', 'ACLs', 'Microsegmentation'],
                        mitigation: 'Isolated 500+ services across zones'
                    },
                    {
                        id: 'hardware',
                        title: 'Hardware Management',
                        threat: 'Infrastructure bottleneck',
                        description: 'Deployed and managed large-scale network and server hardware across enterprise environments. Ensured proper connections, segmentation, and optimization for both small and large deployments.',
                        protocols: ['Hardware Lifecycle', 'Cable Management', 'Rack Design', 'Port Mapping'],
                        mitigation: 'Managed 5K+ servers and 1K+ network devices'
                    }
                ]
            },
            bigdata: {
                id: 'bigdata',
                name: 'Big Data Analytics',
                icon: '🧠',
                color: '#9d4eff',
                station: 'Analytics Command',
                scenarios: [
                    {
                        id: 'analytics',
                        title: 'Big Data Analytics',
                        threat: 'Data insight deficit',
                        description: 'Architected big data analytics pipelines processing petabytes of data. Implemented real-time and batch processing systems for business intelligence and security analytics.',
                        protocols: ['Hadoop', 'Spark', 'Kafka', 'Data Lakes', 'Stream Processing'],
                        mitigation: 'Processing 50TB+ daily with real-time insights'
                    },
                    {
                        id: 'visualization',
                        title: 'Data Visualization',
                        threat: 'Communication gap',
                        description: 'Created technical documentation and visual representations of complex big data architectures for executive presentations. Developed dashboards and metrics for stakeholder reporting.',
                        protocols: ['Tableau', 'Power BI', 'Custom Dashboards', 'Technical Writing'],
                        mitigation: 'Delivered 100+ executive presentations'
                    },
                    {
                        id: 'scalability',
                        title: 'Pioneering Scalability',
                        threat: 'Growth limitation',
                        description: 'Pioneered scalability solutions for data center operations, enabling horizontal scaling from 100 to 10,000+ nodes. Developed protocols and procedures for elastic infrastructure.',
                        protocols: ['Auto-scaling', 'Load Balancing', 'Distributed Systems', 'Capacity Planning'],
                        mitigation: 'Scaled 100x with zero downtime'
                    }
                ]
            }
        };

        let completedMissions = new Set();
        let currentStation = 'bridge';

        function updateStats() {
            const total = Object.values(missions).reduce((sum, m) => sum + m.scenarios.length, 0);
            const completed = completedMissions.size;
            const progress = (completed / total) * 100;
            const threatLevel = Math.max(1, 5 - Math.floor(progress / 20));

            document.getElementById('dmz-progress').textContent = Math.round(progress) + '%';
            document.getElementById('missions-count').textContent = `${completed}/${total}`;
            
            const threatLevelEl = document.getElementById('threat-level');
            threatLevelEl.textContent = `${threatLevel}/5`;
            threatLevelEl.className = 'status-value ' + (threatLevel > 3 ? 'warning' : '');

            const progressFill = document.getElementById('progress-fill');
            progressFill.style.width = progress + '%';

            const markers = document.querySelectorAll('.marker');
            markers.forEach((marker, i) => {
                const markValue = i * 25;
                if (progress >= markValue) {
                    marker.classList.add('active');
                }
            });

            if (progress === 100) {
                document.getElementById('dmz-achieved').classList.remove('hidden');
            }
        }

        function renderStations() {
            const container = document.getElementById('mission-stations');
            container.innerHTML = '';

            Object.values(missions).forEach(mission => {
                const completed = mission.scenarios.filter(s => 
                    completedMissions.has(`${mission.id}-${s.id}`)
                ).length;
                const total = mission.scenarios.length;
                const stationComplete = completed === total;

                const card = document.createElement('div');
                card.className = 'station-card ' + (stationComplete ? 'complete' : '');
                card.style.borderColor = mission.color;
                card.style.color = mission.color;
                card.onclick = () => showStation(mission.id);

                card.innerHTML = `
                    <div class="station-icon">
                        <span style="font-size: 32px;">${mission.icon}</span>
                        ${stationComplete ? '<div class="complete-badge">✓</div>' : ''}
                    </div>
                    <div class="station-info">
                        <div class="station-name" style="color: ${mission.color}">${mission.station}</div>
                        <div class="station-category">${mission.name}</div>
                        <div class="station-progress">${completed}/${total} Scenarios Complete</div>
                    </div>
                    <div class="station-chevron" style="color: ${mission.color}">›</div>
                `;

                container.appendChild(card);
            });
        }

        function showStation(stationId) {
            currentStation = stationId;
            document.getElementById('bridge-view').classList.add('hidden');
            
            const stationView = document.getElementById(`station-${stationId}`);
            if (stationView) {
                stationView.classList.add('active');
            }
        }

        function showBridge() {
            currentStation = 'bridge';
            document.getElementById('bridge-view').classList.remove('hidden');
            document.querySelectorAll('.station-view').forEach(view => {
                view.classList.remove('active');
            });
        }

        function completeMission(missionId, scenarioId) {
            const key = `${missionId}-${scenarioId}`;
            completedMissions.add(key);
            updateStats();
            renderStations();
            renderStationView(missionId);
        }

        function renderStationView(missionId) {
            const mission = missions[missionId];
            let view = document.getElementById(`station-${missionId}`);
            
            if (!view) {
                view = document.createElement('div');
                view.id = `station-${missionId}`;
                view.className = 'station-view';
                document.getElementById('station-views').appendChild(view);
            }

            view.innerHTML = `
                <div class="station-header">
                    <button class="back-button" onclick="showBridge()">← RETURN TO BRIDGE</button>
                    <div class="station-title">
                        <span style="font-size: 40px; color: ${mission.color}">${mission.icon}</span>
                        <div>
                            <h2>${mission.station}</h2>
                            <div class="station-subtitle">${mission.name}</div>
                        </div>
                    </div>
                </div>

                <div class="scenarios-grid">
                    ${mission.scenarios.map(scenario => {
                        const isCompleted = completedMissions.has(`${mission.id}-${scenario.id}`);
                        return `
                            <div class="scenario-card ${isCompleted ? 'completed' : ''}">
                                <div class="scenario-header">
                                    <div class="scenario-title">${scenario.title}</div>
                                    ${isCompleted ? 
                                        '<span class="icon complete-icon">✓</span>' :
                                        '<span class="icon threat-icon">⚠️</span>'
                                    }
                                </div>
                                
                                <div class="threat-banner" style="border-color: ${mission.color}">
                                    ⚠️ ${scenario.threat}
                                </div>

                                <div class="scenario-description">
                                    ${scenario.description}
                                </div>

                                <div class="protocols-list">
                                    <div class="protocols-label">PROTOCOLS DEPLOYED:</div>
                                    ${scenario.protocols.map(protocol => 
                                        `<span class="protocol-tag">${protocol}</span>`
                                    ).join('')}
                                </div>

                                <div class="mitigation-result" style="border-color: ${mission.color}">
                                    ✓ ${scenario.mitigation}
                                </div>

                                ${!isCompleted ? `
                                    <button 
                                        class="engage-button"
                                        style="background: ${mission.color}"
                                        onclick="completeMission('${mission.id}', '${scenario.id}')"
                                    >
                                        COMPLETE MISSION
                                    </button>
                                ` : ''}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function initializeStationViews() {
            Object.keys(missions).forEach(missionId => {
                renderStationView(missionId);
            });
        }

        // Initialize
        renderStations();
        initializeStationViews();
        updateStats();
    </script>
</body>
</html>
